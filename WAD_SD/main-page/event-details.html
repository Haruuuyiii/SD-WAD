<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Details - CozMoz</title>
    <link rel="stylesheet" href="../main-page/styles.css" />
    <link rel="stylesheet" href="./event-details.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <a href="../main-page/index.html" class="main-menu">
          <img class="logo" src="../images/logo.png" alt="logo" />
          <h2 class="menu-text">CozMoz</h2>
        </a>
        <div class="nav-middle"></div>
        <ul class="nav-menu">
          <li class="nav-items">
            <a href="../main-page/index.html" class="nav-link">HOME</a>
          </li>
          <li class="nav-items">
            <a href="events.html" class="nav-link">EVENTS</a>
          </li>
          <li class="nav-items"><a href="#" class="nav-link">ADMIN</a></li>
        </ul>
      </nav>
    </header>
    <main style="padding-top: 10rem">
      <section id="event-details-section">
        <div class="event-details-card">
          <div class="event-details-img"></div>
          <div class="event-details-status">ONGOING</div>
          <div class="event-details-info">
            <h1>TEST TESTING</h1>
            <div class="event-details-meta">
              <div>
                <i class="fa-regular fa-calendar"></i> <b>Date & Time:</b> April
                22, 2026 at 12:40 PM
              </div>
              <div>
                <i class="fa-solid fa-location-dot"></i> <b>Location:</b> URS
                MORONG - EARTS
              </div>
              <div>
                <i class="fa-regular fa-clock"></i>
                <b>Registration Deadline:</b> April 30, 2026 10:49 AM
              </div>
              <div>
                <i class="fa-solid fa-users"></i> <b>Participants:</b> 2
                registered
              </div>
            </div>
            <div class="event-details-desc">
              <b>About This Event</b>
              <p>FOR TESTING TEST TEST 123 123</p>
            </div>
            <a href="register.html" class="register-btn">Register Now</a>
          </div>
        </div>
      </section>
    </main>
  </body>
